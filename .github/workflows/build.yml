name: Build and Package
on:
  push:
    branches: [main]
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npm run compile
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: sentop-devsphere
          path: "*.vsix"
